<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind Enterprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(20, 25, 35, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-accent: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --user-msg: rgba(59, 130, 246, 0.2);
            --bot-msg: rgba(30, 41, 59, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, var(--bg-color));
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .app-container {
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 15, 25, 0.4);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .upload-section {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .custom-file-upload {
            border: 1px solid var(--glass-border);
            display: inline-block;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .custom-file-upload:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background: var(--primary-accent);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .chat-area {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg);
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bot-msg);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass-border);
        }

        .input-area {
            padding: 24px 32px;
            background: rgba(11, 15, 25, 0.6);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 16px;
        }

        .input-area input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input[type="text"]:focus {
            border-color: var(--primary-accent);
        }

        .input-area button {
            padding: 0 32px;
            border-radius: 12px;
            font-size: 1rem;
            height: auto;
        }

        .status-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-left: 12px;
        }

        /* Loading Dots */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 8px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>DocuMind Enterprise</h1>
        <div class="upload-section">
            <span id="uploadStatus" class="status-text">No document loaded.</span>
            <label class="custom-file-upload">
                <input type="file" id="pdfFile" accept=".pdf" />
                Select PDF
            </label>
            <button class="btn" id="uploadBtn" onclick="uploadDocument()">Upload & Index</button>
        </div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message bot">
            Hello! I am DocuMind Enterprise Assistant. Please upload an SOP document first, and then you can ask me questions about it!
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="questionInput" placeholder="Ask a question about the document..." onkeypress="handleKeyPress(event)" disabled />
        <button class="btn" id="sendBtn" onclick="askQuestion()" disabled>Send</button>
    </div>
</div>

<script>
    const chatArea = document.getElementById('chatArea');
    const uploadStatus = document.getElementById('uploadStatus');
    const questionInput = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    const uploadBtn = document.getElementById('uploadBtn');

    function appendMessage(text, isUser = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isUser ? 'user' : 'bot'}`;
        msgDiv.textContent = text;
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTypingIndicator() {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message bot';
        msgDiv.id = 'typingIndicator';
        msgDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    async function uploadDocument() {
        const fileInput = document.getElementById('pdfFile');
        const file = fileInput.files[0];
        
        if (!file) {
            alert('Please select a PDF file first.');
            return;
        }

        const formData = new FormData();
        formData.append('file', file);

        uploadStatus.textContent = 'Uploading and indexing...';
        uploadBtn.disabled = true;

        try {
            const response = await fetch('/ingest', {
                method: 'POST',
                body: formData
            });

            const rawText = await response.text();
            let result = {};

            try {
                result = rawText ? JSON.parse(rawText) : {};
            } catch {
                result = { detail: rawText || 'Unexpected server response' };
            }
            
            if (response.ok) {
                uploadStatus.textContent = 'Document indexed successfully!';
                uploadStatus.style.color = '#4ade80';
                questionInput.disabled = false;
                sendBtn.disabled = false;
                appendMessage(`Successfully loaded: ${file.name}. What would you like to know?`);
            } else {
                uploadStatus.textContent = 'Error during upload.';
                uploadStatus.style.color = '#ef4444';
                alert(result.detail || 'Upload failed');
            }
        } catch (error) {
            uploadStatus.textContent = 'Connection error.';
            uploadStatus.style.color = '#ef4444';
            alert('Server connection failed. Make sure uvicorn is running on http://127.0.0.1:8000 and then try again.');
            console.error('Error:', error);
        } finally {
            uploadBtn.disabled = false;
        }
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            askQuestion();
        }
    }

    async function askQuestion() {
        const text = questionInput.value.trim();
        if (!text) return;

        appendMessage(text, true);
        questionInput.value = '';
        questionInput.disabled = true;
        sendBtn.disabled = true;

        showTypingIndicator();

        try {
            const response = await fetch('/query', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ question: text })
            });

            const result = await response.json();
            removeTypingIndicator();

            if (response.ok) {
                appendMessage(result.answer);
            } else {
                appendMessage('Sorry, I encountered an error processing your request.');
            }
        } catch (error) {
            removeTypingIndicator();
            appendMessage('Network connection error.');
            console.error('Error:', error);
        } finally {
            questionInput.disabled = false;
            sendBtn.disabled = false;
            questionInput.focus();
        }
    }
</script>
</body>
</html>
