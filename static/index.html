<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DocuMind Enterprise - Advanced RAG SOP Assistant for corporate compliance and training.">
    <title>DocuMind Enterprise | RAG SOP Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- AUTHENTICATION VIEW -->
    <div id="authView" role="dialog" aria-labelledby="authTitle">
        <div class="auth-card">
            <div class="auth-logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
            </div>
            <h2 id="authTitle">DocuMind Login</h2>
            <div id="authError" aria-live="polite" style="color: var(--accent-rose); margin-bottom: 24px; font-size: 0.95rem; font-weight: 500;"></div>
            <form id="authForm" autocomplete="off" onsubmit="event.preventDefault(); handleAuth();">
                <div class="input-container">
                    <input type="text" id="username" autocomplete="off" placeholder="Username" aria-label="Username" required pattern="[A-Za-z]{3,20}" title="Letters only, 3-20 characters">
                    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <div class="input-container">
                    <input type="password" id="password" autocomplete="new-password" placeholder="Password" aria-label="Password" required minlength="6">
                    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
                <button type="submit" class="btn" id="authBtn" style="width:100%; padding:18px; margin-top:10px;">Login Into Workspace</button>
            </form>
            <div class="auth-toggle" onclick="toggleAuthMode()" tabindex="0" role="button" aria-label="Toggle between login and signup">New account? Create Workspace Access</div>
        </div>
    </div>

    <!-- MAIN APPLICATION VIEW -->
    <div id="appView">
        <nav class="sidebar" aria-label="Chat History and Profile">
            <button class="new-chat-btn" onclick="newChat()" aria-label="Start new session">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Session
            </button>
            <div class="history-list" id="historyList" role="list" aria-label="Recent queries">
                <!-- History items injected here -->
            </div>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="userInitial" aria-hidden="true">U</div>
                    <div class="user-info">
                        <div id="userNameDisp" style="font-weight:700; font-size: 0.95rem; letter-spacing: -0.02em;">User</div>
                        <button class="logout-btn" onclick="logout()" aria-label="Sign out">
                            <svg class="icon" style="width:12px; height:12px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                            Sign Out
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-nav">
                <div class="brand">
                    <h1 id="activeDocName">DocuMind Enterprise</h1>
                </div>
                <div class="upload-tools">
                    <span id="uploadStatus" aria-live="status">Ready</span>
                    <button class="btn status-highlight-btn" id="statusHighlightBtn" onclick="highlightReady()" aria-label="Ready highlight" style="display:none; background: var(--accent-emerald); gap: 6px;">
                        <svg class="icon" style="width:16px; height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
                        Ready to Go!
                    </button>
                    <button class="btn" id="shareSessionBtn" onclick="shareEntireSession()" aria-label="Share entire session" style="display:none; background: var(--accent-blue); gap: 6px;">
                        <svg class="icon" style="width:16px; height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                        Share Session
                    </button>
                    <input type="file" id="pdfFile" accept=".pdf,.txt" style="display:none" onchange="uploadDocument()" aria-hidden="true">
                    <button class="btn" onclick="document.getElementById('pdfFile').click()" aria-label="Upload document">
                        <svg class="icon" style="margin-right:8px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        Load SOP
                    </button>
                </div>
            </header>

            <section class="chat-feed" id="chatArea" aria-label="Conversation area" role="log">
                <!-- Messages injected here -->
                <div class="message-container">
                    <div class="message bot">
                        <div class="message-avatar" aria-hidden="true">AI</div>
                        <div class="message-text">Hello! I am DocuMind. Upload an SOP document to begin chatting.</div>
                    </div>
                </div>
            </section>

            <footer class="bottom-shelf">
                <div class="input-box" onclick="document.getElementById('questionInput').focus()">
                    <textarea id="questionInput" placeholder="Ask anything about your SOPs..." 
                               rows="1" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
                               onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); askQuestion(); }"
                               aria-label="Message DocuMind"></textarea>
                    <button class="send-pill" id="sendBtn" onclick="askQuestion()" aria-label="Send message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <!-- SHARE MODAL -->
    <div id="shareModal" class="share-modal" style="display: none;">
        <div class="share-modal-content">
            <div class="share-modal-header">
                <h3>Share This Chat</h3>
                <button class="share-modal-close" onclick="document.getElementById('shareModal').style.display = 'none';">&times;</button>
            </div>
            <div class="share-modal-body">
                <div class="share-section">
                    <label>Share Link:</label>
                    <div class="share-url-container">
                        <input type="text" id="shareUrlInput" readonly class="share-url-input">
                        <button class="btn-icon-copy" onclick="copyToClipboard('shareUrlInput')" title="Copy link">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                        </button>
                    </div>
                </div>
                <div class="share-section">
                    <label>Share Text:</label>
                    <textarea id="shareTextInput" class="share-text-input" readonly></textarea>
                    <button class="btn" onclick="copyToClipboard('shareTextInput')" style="width: 100%; margin-top: 8px;">
                        <svg class="icon" style="width:14px; height:14px; margin-right:4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                        Copy Text
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
